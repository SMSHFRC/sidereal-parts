# Render Blueprint — 一鍵部署 Web Service + PostgreSQL
services:
  - type: web
    name: parts-task-api
    runtime: node
    plan: starter
    buildCommand: npm ci && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: parts-task-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: 1h
      - key: JWT_REFRESH_TTL
        value: 7d
      - key: BCRYPT_ROUNDS
        value: "12"
      - key: CORS_ORIGINS
        sync: false # 部署後於 Dashboard 填入前端網域

databases:
  - name: parts-task-db
    plan: starter
